name: Sync llms.txt from Website

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-llms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest llms.txt
        run: |
          curl -s https://lycantyr.com/llms.txt -o llms.txt

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add llms.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync llms.txt from website" && git push)

      - name: Push rules to itch.io
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: documentation
          ITCH_GAME: lycantyr
          ITCH_USER: lycantyr
          PACKAGE: llms.txt
