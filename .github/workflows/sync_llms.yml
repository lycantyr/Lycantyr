name: Sync llms.txt and README

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-llms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest llms.txt
        run: |
          curl -4 -sS -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" --connect-timeout 15 --retry 5 https://lycantyr.com/llms.txt -o llms.txt

      - name: Copy llms.txt to README.md
        run: |
          cp llms.txt README.md

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add llms.txt README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync llms.txt and README.md from website" && git push)
